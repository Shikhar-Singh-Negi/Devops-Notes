kind: ReplicaSet
apiVersion: app/v1
metadata:
  name: nginx-replicasets
  namespace: nginx
spec:
  #  kitna banana hai
  replicas: 2
  # kiska banana hai
  selector:
    matchLabels:
      app: nginx
# define pod(pod.yml)  agar hum pod.yml nahi bhi likhege tho bhi chalega
  template:
    metadata:
      name: nginx-rep-pod
      lables:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

# Isme hum rolling updates nahi karsakte

# To create
#  kubectl apply -f replicasets.yml

# To check
#  kubectl get replicasets -n nginx

# Deployment is more advance than this

