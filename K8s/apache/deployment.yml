kind: Deployment
apiVersion: app/v1
metadata: 
  name: apache-deployment
  namespace: apache
spec:
  replicas: 1
  selector:
    matchLables:
      app: apache

  templet:
    metadata:
    name: apache
    lables:
      app: apache
    spec:
      containers:
      - name: apache
        image: httpd:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
