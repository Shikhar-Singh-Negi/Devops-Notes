kind: StatefulSet
apiVersion: app/v1
metadata:
  name: mysql-statefulset
  # First we have to create namespace
  namespace: mysql

spec:
  serviceName: mysql-service
  replicas: 3
  selector:
    matchLabels:
      app: mysql
    template:
      metadata:
        lables:
          app: mysql
      spec:
        containers:
        - name: mysql
          image: mysql:8.0
          ports:
          - containerPort: 3306
          env:
          - name: MYSQL_ROOT_PASSWORD
            vale: root

          - name: MYSQL_DATABASE
            valueFrom:
              configMapKeyRef:
                name: mysql-config-map
                key: MYSQL_DATABASE

          volumeMount:
          - name: mysql-data
            mountPath: /var/lib/mysql

    volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi

